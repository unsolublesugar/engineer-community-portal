<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ site_description }}{% endblock %}">
  <!-- OGP -->
  <meta property="og:title" content="{% block og_title %}{{ site_title }}{% endblock %}">
  <meta property="og:description" content="{{ site_description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site_url }}">
  <meta property="og:site_name" content="{{ site_title }}">
  <meta property="og:image" content="{{ site_og_image }}">
  <meta property="og:locale" content="ja_JP">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block twitter_title %}{{ site_title }}{% endblock %}">
  <meta name="twitter:description" content="{{ site_description }}">
  <meta name="twitter:image" content="{{ site_og_image }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🙌</text></svg>">
  <link rel="stylesheet" href="{{ base_path }}/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ base_path }}/" class="site-logo">
        <span class="logo-icon">🙌</span>
        <span class="logo-text">{{ site_name }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ base_path }}/" class="nav-link {% block nav_home %}{% endblock %}">イベント</a>
        <a href="{{ base_path }}/speakers" class="nav-link {% block nav_speakers %}{% endblock %}">登壇者</a>
        <a href="{{ base_path }}/challenge" class="nav-link {% block nav_challenge %}{% endblock %}">企画</a>
        <a href="{{ base_path }}/about" class="nav-link {% block nav_about %}{% endblock %}">About</a>
      </nav>
      <div class="header-actions">
        <a href="{{ community.connpass_url }}" target="_blank" rel="noopener" class="btn btn-primary btn-sm">参加する</a>
      </div>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <div class="footer-links">
          {% if community.connpass_url %}
          <a href="{{ community.connpass_url }}" target="_blank" rel="noopener" class="btn btn-outline btn-sm">
            <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            コミュニティ
          </a>
          {% endif %}
          {% if community.youtube_channel %}
          <a href="{{ community.youtube_channel }}?sub_confirmation=1" target="_blank" rel="noopener" class="btn btn-outline btn-sm">
            <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><polygon points="10 9 16 12 10 15 10 9"/></svg>
            チャンネル登録
          </a>
          {% endif %}
        </div>
      </div>
      <p class="footer-copyright">© {{ site_name }} / Powered by <a href="https://github.com/unsolublesugar/engineer-community-portal" target="_blank" rel="noopener">Engineer Community Portal</a></p>
    </div>
  </footer>

  <script src="{{ base_path }}/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
